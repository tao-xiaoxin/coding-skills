name: Release Skills

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Semantic version tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Tag must use vMAJOR.MINOR.PATCH" >&2; exit 1 ;;
          esac

      - name: Install GitHub CLI with gh skill support
        run: |
          set -euo pipefail
          GH_VERSION=2.90.0
          curl --fail --location --silent --show-error \
            "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" \
            --output gh.tar.gz
          tar -xzf gh.tar.gz
          echo "$PWD/gh_${GH_VERSION}_linux_amd64/bin" >> "$GITHUB_PATH"

      - name: Validate and publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          gh skill publish --dry-run
          gh skill publish --tag "$TAG"
